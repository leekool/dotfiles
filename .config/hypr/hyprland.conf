# Hyprland config ported from ~/.config/dwm/config.h

################
### MONITORS ###
################

monitor=,preferred,auto,1.25


###################
### MY PROGRAMS ###
###################

$mainMod = SUPER
$terminal = ghostty
$fallbackTerminal = ghostty
$browser = librewolf
$menu = fuzzel
$music = ghostty -e ncmpcpp
$runterminal = ghostty
$screenshotBox = sh ~/.local/bin/screenshotssh.sh box
$screenshotWindow = sh ~/.local/bin/screenshotssh.sh window
$runemacs = emacsclient -c -a emacs
$pickColor = sh -lc 'command -v hyprpicker >/dev/null 2>&1 && hyprpicker -a || sh ~/.local/bin/xcolor.sh'
$toggleBar = sh -lc 'if pgrep -x quickshell >/dev/null; then pkill -x quickshell; else quickshell >/dev/null 2>&1 & fi'
$toggleLayout = sh -lc 'layout=$(hyprctl getoption general:layout | awk -F: '\''/str:/ {gsub(/^ /, "", $2); print $2}'\''); if [ "$layout" = "master" ]; then hyprctl keyword general:layout dwindle; else hyprctl keyword general:layout master; fi'
$gapsDown = sh -lc 'g=$(hyprctl getoption general:gaps_in | awk '\''/int:/ {print $2}'\''); g=$((g > 0 ? g - 1 : 0)); hyprctl keyword general:gaps_in "$g"; hyprctl keyword general:gaps_out "$g"'
$gapsUp = sh -lc 'g=$(hyprctl getoption general:gaps_in | awk '\''/int:/ {print $2}'\''); g=$((g + 1)); hyprctl keyword general:gaps_in "$g"; hyprctl keyword general:gaps_out "$g"'


#################
### AUTOSTART ###
#################

exec-once = quickshell
exec-once = nm-applet --indicator
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=secrets


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 1

    col.active_border = rgba(3d3d3dee)
    col.inactive_border = rgba(3d3d3daa)

    resize_on_border = false
    allow_tearing = false

    layout = master
}

decoration {
    rounding = 4
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(000000aa)
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1

    animation = windows, 1, 5, easeOutQuint
    animation = windowsIn, 1, 4, easeOutQuint, popin 85%
    animation = windowsOut, 1, 2, easeInOutCubic, popin 85%
    animation = border, 1, 4, easeOutQuint
    animation = fade, 1, 3, easeInOutCubic
    animation = workspaces, 1, 3, easeInOutCubic
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}

xwayland {
    force_zero_scaling = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 1.0

    touchpad {
        natural_scroll = false
    }
}

device {
    name = logitech-g603-1
    sensitivity = 1.0
    accel_profile = adaptive
}

device {
    name = bastard-keyboards-charybdis-mini-(3x6)-splinky-mouse
    sensitivity = 1.0
    accel_profile = adaptive
}

gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

# Core app bindings from dwm
bind = $mainMod, RETURN, layoutmsg, swapwithmaster
bind = $mainMod ALT, RETURN, exec, $runterminal
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, $toggleBar
bind = $mainMod, E, exec, $runemacs
bind = $mainMod, C, exec, $pickColor
bind = $mainMod, P, exec, mpc toggle

# Window management
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
bind = $mainMod, I, layoutmsg, addmaster
bind = $mainMod, D, layoutmsg, removemaster
bind = $mainMod, H, layoutmsg, mfact -0.02
bind = $mainMod, L, layoutmsg, mfact +0.02
bind = $mainMod ALT, H, resizeactive, 0 40
bind = $mainMod ALT, L, resizeactive, 0 -40
bind = $mainMod, Q, workspace, previous
bind = $mainMod ALT, Q, exit,
bind = $mainMod ALT, C, killactive,
bind = $mainMod, TAB, layoutmsg, swapwithmaster
bind = ALT, TAB, cyclenext,
bind = ALT SHIFT, TAB, cyclenext, prev

# Layouts and floating
bind = $mainMod, T, exec, sh ~/.local/bin/hypr-set-master.sh
bind = $mainMod, F, exec, hyprctl keyword general:layout dwindle
bind = $mainMod, M, fullscreen, 0
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod ALT, SPACE, togglefloating,
bind = $mainMod, minus, exec, $gapsDown
bind = $mainMod, equal, exec, $gapsUp

# Monitor and workspace movement
bind = $mainMod, comma, focusmonitor, l
bind = $mainMod, period, focusmonitor, r
bind = $mainMod ALT, comma, movewindow, mon:l
bind = $mainMod ALT, period, movewindow, mon:r
bind = $mainMod, left, exec, sh ~/.local/bin/hypr-workspace-cycle.sh left
bind = $mainMod, right, exec, sh ~/.local/bin/hypr-workspace-cycle.sh right
bind = $mainMod ALT, left, exec, sh ~/.local/bin/hypr-movetoworkspace-cycle.sh left
bind = $mainMod ALT, right, exec, sh ~/.local/bin/hypr-movetoworkspace-cycle.sh right

# Common apps replacing dwm scratchpads
bind = $mainMod, O, exec, $fallbackTerminal
bind = $mainMod ALT, M, exec, $music
bind = $mainMod ALT, B, exec, $browser

# Screenshots
bind = $mainMod, S, exec, $screenshotBox
bind = $mainMod ALT, S, exec, $screenshotWindow

# Workspaces based on dwm tags I-VI
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

# Mouse actions
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = match:class ^(Gimp)$, float on
windowrule = match:class ^(feh)$, float on
windowrule = match:title ^(Event Tester)$, float on
windowrule = match:title ^(Media viewer)$, float on
windowrule = match:title ^(floating)$, float on
windowrule = float on, match:class ^steam$
windowrule = tile on, match:class ^steam$, match:title ^Steam$
